<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典打砖块</title>
    <style>
        body { 
            background-color: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
            flex-direction: column; 
        }
        canvas { 
            background-color: #000; 
            border: 2px solid #fff; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .back-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background-color: #ff3366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <!-- 游戏的画布 -->
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <p>按键盘 ← 左箭头 或 → 右箭头 移动挡板，击碎所有彩色砖块！制作：_long</p>
    <h2 id="score">得分: 0</h2>
    
    <!-- 返回按钮指向游戏集合页 -->
    <a href="games-hub.html" class="back-btn">⬅ 返回游戏作品集</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // 定义小球
        let ballRadius = 8;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3;
        let dy = -3;

        // 定义挡板
        const paddleHeight = 10;
        const paddleWidth = 75;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;

        // 定义砖块
        const brickRowCount = 4;
        const brickColumnCount = 6;
        const brickWidth = 60;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 35;

        let bricks = [];
        for(let c=0; c<brickColumnCount; c++) {
            bricks[c] = [];
            for(let r=0; r<brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        let score = 0;

        // 监听键盘按下和抬起
        window.addEventListener("keydown", function(e) {
            if(e.key === "ArrowRight") rightPressed = true;
            else if(e.key === "ArrowLeft") leftPressed = true;
        }, false);
        window.addEventListener("keyup", function(e) {
            if(e.key === "ArrowRight") rightPressed = false;
            else if(e.key === "ArrowLeft") leftPressed = false;
        }, false);

        // 碰撞检测
        function collisionDetection() {
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status === 1) {
                        if(x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            scoreElement.innerText = "得分: " + score;
                            // 如果全部打完，重新生成（实现长时间游玩）
                            if(score % (brickRowCount * brickColumnCount) === 0) {
                                resetBricks();
                                dx = dx > 0 ? dx + 0.5 : dx - 0.5; // 速度加快
                                dy = dy > 0 ? dy + 0.5 : dy - 0.5;
                            }
                        }
                    }
                }
            }
        }

        // 重置砖块
        function resetBricks() {
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    bricks[c][r].status = 1;
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI*2);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    if(bricks[c][r].status === 1) {
                        let brickX = (c*(brickWidth+brickPadding)) + brickOffsetLeft;
                        let brickY = (r*(brickHeight+brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        // 给不同行的砖块不同的颜色
                        ctx.fillStyle = ["#FF5733", "#FFC300", "#DAF7A6", "#33FFBD"][r];
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // 左右墙壁反弹
            if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            // 顶部反弹
            if(y + dy < ballRadius) {
                dy = -dy;
            } 
            // 底部逻辑（碰到挡板反弹，否则游戏结束）
            else if(y + dy > canvas.height-ballRadius) {
                if(x > paddleX && x < paddleX + paddleWidth) {
                    // 根据击打挡板的位置稍微改变反弹角度，增加趣味性
                    let hitPoint = x - (paddleX + paddleWidth/2);
                    dx = hitPoint * 0.15; 
                    dy = -dy;
                }
                else {
                    alert("游戏结束！最终得分：" + score);
                    document.location.reload();
                }
            }

            // 移动挡板
            if(rightPressed && paddleX < canvas.width-paddleWidth) {
                paddleX += 7;
            }
            else if(leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
