<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>迷你农场 - 商店版</title>
    <style>
        body { 
            background-color: #5d4037; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: "Microsoft YaHei", sans-serif; 
            flex-direction: column; 
        }
        canvas { 
            background-color: #8bc34a; 
            border: 4px solid #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .info-panel { margin-top: 15px; text-align: center; }
        .back-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background-color: #ff3366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="info-panel">
        <h2 id="money">💰 金币: 0</h2>
        <p>【WASD/方向键】移动 | 【1】锄头 | 【2】种子 | 【3】水壶 | 【空格】操作 | <b style="color:#ffd700">【S键】打开/关闭商店</b></p>
    </div>
    
    <a href="games-hub.html" class="back-btn">⬅ 返回游戏作品集</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const moneyElement = document.getElementById("money");

        const tileSize = 40;
        const rows = 10;
        const cols = 10;

        let money = 0;
        let currentTool = "hoe";
        let shopOpen = false; // 商店是否打开

        // 定义工具等级和价格
        let upgrades = {
            hoe: { level: 1, price: 50, name: "锄头" },
            seed: { level: 1, price: 100, name: "种子背包" },
            water: { level: 1, price: 80, name: "水壶" }
        };

        // 土地状态：0=草地, 1=耕地, 2=已播种, 3=生长中, 4=成熟
        let farm = [];
        for (let r = 0; r < rows; r++) {
            farm[r] = [];
            for (let c = 0; c < cols; c++) {
                farm[r][c] = { state: 0, growTime: 0 };
            }
        }

        let player = { x: 5, y: 5 };

        window.addEventListener("keydown", function(e) {
            if (shopOpen) {
                // 商店模式下，用数字键购买
                if (e.key === "1") buyUpgrade("hoe");
                if (e.key === "2") buyUpgrade("seed");
                if (e.key === "3") buyUpgrade("water");
                if (e.key === "s" || e.key === "S") shopOpen = false; // 按S关闭商店
                return;
            }

            // 正常游戏模式
            if (e.key === "ArrowUp" || e.key === "w") player.y = Math.max(0, player.y - 1);
            if (e.key === "ArrowDown" || e.key === "s") player.y = Math.min(rows - 1, player.y + 1);
            if (e.key === "ArrowLeft" || e.key === "a") player.x = Math.max(0, player.x - 1);
            if (e.key === "ArrowRight" || e.key === "d") player.x = Math.min(cols - 1, player.x + 1);

            if (e.key === "1") currentTool = "hoe";
            if (e.key === "2") currentTool = "seed";
            if (e.key === "3") currentTool = "water";
            if (e.key === "s" || e.key === "S") shopOpen = true; // 按S打开商店
            
            if (e.code === "Space") interact();
        });

        // 购买升级逻辑
        function buyUpgrade(type) {
            let item = upgrades[type];
            if (money >= item.price) {
                money -= item.price;
                item.level++;
                item.price = Math.floor(item.price * 1.5); // 下次升级更贵
                moneyElement.innerText = "💰 金币: " + money;
            } else {
                alert("金币不足！需要 " + item.price + " 金币。");
            }
        }

        // 获取受影响的格子范围（根据等级）
        function getAffectedTiles() {
            let range = 0;
            if (currentTool === "hoe") range = upgrades.hoe.level - 1;
            if (currentTool === "seed") range = upgrades.seed.level - 1;
            if (currentTool === "water") range = upgrades.water.level - 1;

            let tiles = [];
            for (let dy = -range; dy <= range; dy++) {
                for (let dx = -range; dx <= range; dx++) {
                    let nx = player.x + dx;
                    let ny = player.y + dy;
                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                        tiles.push(farm[ny][nx]);
                    }
                }
            }
            return tiles;
        }

        function interact() {
            let tiles = getAffectedTiles();
            tiles.forEach(tile => {
                if (currentTool === "hoe" && tile.state === 0) tile.state = 1;
                else if (currentTool === "seed" && tile.state === 1) { tile.state = 2; tile.growTime = 0; }
                else if (currentTool === "water" && tile.state === 2) tile.state = 3;
                else if (tile.state === 4) { tile.state = 1; money += 10; }
            });
            moneyElement.innerText = "💰 金币: " + money;
        }

        // 作物生长
        setInterval(() => {
            if (shopOpen) return; // 商店打开时暂停生长
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (farm[r][c].state === 3) {
                        farm[r][c].growTime++;
                        if (farm[r][c].growTime > 5) farm[r][c].state = 4;
                    }
                }
            }
        }, 1000);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制农田
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let x = c * tileSize;
                    let y = r * tileSize;
                    let tile = farm[r][c];

                    if (tile.state === 0) ctx.fillStyle = "#8bc34a";
                    else if (tile.state === 1) ctx.fillStyle = "#795548";
                    else if (tile.state === 2) ctx.fillStyle = "#5d4037";
                    else if (tile.state === 3) ctx.fillStyle = "#aed581";
                    else if (tile.state === 4) ctx.fillStyle = "#ffeb3b";

                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeStyle = "rgba(0,0,0,0.1)";
                    ctx.strokeRect(x, y, tileSize, tileSize);

                    ctx.font = "24px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    if (tile.state === 2) ctx.fillText("🌱", x + tileSize/2, y + tileSize/2);
                    if (tile.state === 4) ctx.fillText("🌾", x + tileSize/2, y + tileSize/2);
                }
            }

            // 绘制农民
            ctx.fillStyle = "#f44336";
            ctx.fillRect(player.x * tileSize + 5, player.y * tileSize + 5, tileSize - 10, tileSize - 10);

            // 如果商店打开，绘制商店遮罩层
            if (shopOpen) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "white";
                ctx.font = "20px Microsoft YaHei";
                ctx.textAlign = "center";
                ctx.fillText("--- 农具商店 (按S关闭) ---", canvas.width/2, 80);
                
                let yStart = 140;
                let gap = 50;
                ctx.font = "16px Microsoft YaHei";
                
                // 显示锄头升级
                ctx.fillStyle = upgrades.hoe.level > 1 ? "#aaa" : "white";
                ctx.fillText(`【按1】升级锄头 (Lv.${upgrades.hoe.level}) - ${upgrades.hoe.price}金币`, canvas.width/2, yStart);
                
                // 显示种子升级
                ctx.fillStyle = upgrades.seed.level > 1 ? "#aaa" : "white";
                ctx.fillText(`【按2】升级背包 (Lv.${upgrades.seed.level}) - ${upgrades.seed.price}金币`, canvas.width/2, yStart + gap);
                
                // 显示水壶升级
                ctx.fillStyle = upgrades.water.level > 1 ? "#aaa" : "white";
                ctx.fillText(`【按3】升级水壶 (Lv.${upgrades.water.level}) - ${upgrades.water.price}金币`, canvas.width/2, yStart + gap * 2);
            } else {
                // 正常显示工具提示
                ctx.fillStyle = "white";
                ctx.font = "14px Microsoft YaHei";
                ctx.textAlign = "left";
                let toolName = currentTool === "hoe" ? "锄头" : (currentTool === "seed" ? "种子" : "水壶");
                ctx.fillText("当前工具: " + toolName + " (Lv." + upgrades[currentTool].level + ")", 10, 20);
            }
        }

        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
