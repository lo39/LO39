<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>勇者的地下城 - 回合制RPG</title>
    <style>
        body { 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: "Microsoft YaHei", sans-serif; 
            flex-direction: column; 
        }
        .game-box {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 400px;
            text-align: center;
        }
        .battle-scene {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 150px;
            padding: 20px;
            background-color: #2c3e50;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 60px;
        }
        .stats { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 15px; }
        .hp-bar { width: 100%; height: 10px; background: #555; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .hp-fill { height: 100%; background: #e74c3c; transition: width 0.3s; }
        
        .log-box {
            height: 100px;
            background: #222;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            font-size: 13px;
            color: #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #555;
        }
        .actions button {
            width: 48%;
            padding: 10px;
            margin: 5px 1%;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-atk { background-color: #e74c3c; color: white; }
        .btn-heal { background-color: #2ecc71; color: white; }
        .back-btn { display: inline-block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="game-box">
        <h2>⚔️ 勇者的地下城 (Lv.<span id="p-lv">1</span>)</h2>
        
        <!-- 战斗场景 -->
        <div class="battle-scene">
            <div id="player-sprite">🧑‍🎤</div>
            <div style="font-size: 30px;">VS</div>
            <div id="enemy-sprite">🐀</div>
        </div>

        <!-- 双方血量状态 -->
        <div class="stats">
            <div style="width: 45%;">
                勇者 HP: <span id="p-hp">100</span>/<span id="p-max-hp">100</span>
                <div class="hp-bar"><div id="p-hp-bar" class="hp-fill" style="width: 100%;"></div></div>
            </div>
            <div style="width: 45%; text-align: right;">
                <span id="e-name">老鼠</span> HP: <span id="e-hp">30</span>/<span id="e-max-hp">30</span>
                <div class="hp-bar"><div id="e-hp-bar" class="hp-fill" style="width: 100%;"></div></div>
            </div>
        </div>

        <!-- 战斗日志 -->
        <div class="log-box" id="log">
            <div>欢迎来到地下城！一场恶战即将开始...</div>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
            <button class="btn-atk" onclick="playerAction('attack')">⚔️ 普通攻击</button>
            <button class="btn-heal" onclick="playerAction('heal')">💖 喝药水 (<span id="potions">3</span>)</button>
        </div>
        
        <a href="games-hub.html" class="back-btn">⬅ 返回游戏作品集</a>
    </div>

    <script>
        // 玩家属性
        let player = { lv: 1, maxHp: 100, hp: 100, atk: 10, potions: 3, exp: 0, nextExp: 50 };
        
        // 怪物池
        const monsters = [
            { name: "史莱姆", sprite: "💧", hp: 40, atk: 5, exp: 20 },
            { name: "哥布林", sprite: "👺", hp: 60, atk: 8, exp: 35 },
            { name: "骷髅兵", sprite: "💀", hp: 80, atk: 12, exp: 50 },
            { name: "恶龙", sprite: "🐉", hp: 150, atk: 20, exp: 150 }
        ];
        let currentEnemy = {};

        // 生成新怪物
        function spawnEnemy() {
            // 根据玩家等级随机生成怪物（等级越高越容易遇到强的）
            let index = Math.min(Math.floor(Math.random() * (player.lv + 1)), monsters.length - 1);
            let template = monsters[index];
            currentEnemy = { ...template, maxHp: template.hp + (player.lv * 5) }; // 怪物也会随你变强
            currentEnemy.hp = currentEnemy.maxHp;
            
            document.getElementById("e-name").innerText = currentEnemy.name;
            document.getElementById("e-sprite").innerText = currentEnemy.sprite;
            updateUI();
            log(`一只野生的 ${currentEnemy.name} 出现了！`);
        }

        // 更新界面显示
        function updateUI() {
            document.getElementById("p-lv").innerText = player.lv;
            document.getElementById("p-hp").innerText = Math.floor(player.hp);
            document.getElementById("p-max-hp").innerText = player.maxHp;
            document.getElementById("p-hp-bar").style.width = (player.hp / player.maxHp * 100) + "%";
            
            document.getElementById("e-hp").innerText = Math.floor(currentEnemy.hp);
            document.getElementById("e-max-hp").innerText = currentEnemy.maxHp;
            document.getElementById("e-hp-bar").style.width = (currentEnemy.hp / currentEnemy.maxHp * 100) + "%";
            
            document.getElementById("potions").innerText = player.potions;
        }

        // 写日志
        function log(msg) {
            let logBox = document.getElementById("log");
            logBox.innerHTML += `<div>> ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 玩家行动
        function playerAction(action) {
            if (currentEnemy.hp <= 0) return; // 怪物死了不能动

            if (action === 'attack') {
                // 造成随机伤害 (攻击力上下浮动20%)
                let dmg = Math.floor(player.atk * (0.8 + Math.random() * 0.4));
                currentEnemy.hp -= dmg;
                log(`你对 ${currentEnemy.name} 造成了 ${dmg} 点伤害！`);
                
                // 简单的攻击动画效果
                document.getElementById("player-sprite").style.transform = "translateX(20px)";
                setTimeout(() => document.getElementById("player-sprite").style.transform = "translateX(0)", 100);

            } else if (action === 'heal') {
                if (player.potions > 0) {
                    let healAmount = 40;
                    player.hp = Math.min(player.maxHp, player.hp + healAmount);
                    player.potions--;
                    log(`你喝下药水，恢复了 ${healAmount} 点生命。`);
                } else {
                    log("药水用光了！无法治疗！");
                    return; // 没药水不结束回合
                }
            }

            updateUI();

            if (currentEnemy.hp <= 0) {
                winBattle();
            } else {
                // 延迟一下让怪物反击，更有回合制的感觉
                setTimeout(enemyTurn, 600);
            }
        }

        // 怪物回合
        function enemyTurn() {
            if (currentEnemy.hp <= 0) return;
            let dmg = Math.floor(currentEnemy.atk * (0.8 + Math.random() * 0.4));
            player.hp -= dmg;
            log(`${currentEnemy.name} 对你发起了攻击，造成 ${dmg} 点伤害！`);
            
            document.getElementById("enemy-sprite").style.transform = "translateX(-20px)";
            setTimeout(() => document.getElementById("enemy-sprite").style.transform = "translateX(0)", 100);

            updateUI();

            if (player.hp <= 0) {
                player.hp = 0;
                updateUI();
                alert("你被打败了... 刷新页面重新开始吧！");
                document.location.reload();
            }
        }

        // 战斗胜利
        function winBattle() {
            log(`🎉 击败了 ${currentEnemy.name}！获得 ${currentEnemy.exp} 经验值。`);
            player.exp += currentEnemy.exp;
            
            // 概率掉落药水
            if (Math.random() > 0.7) {
                player.potions++;
                log("💡 怪物掉落了一瓶药水！");
            }

            // 升级判定
            if (player.exp >= player.nextExp) {
                player.lv++;
                player.maxHp += 20;
                player.hp = player.maxHp; // 升级回满血
                player.atk += 5;
                player.exp = 0;
                player.nextExp = Math.floor(player.nextExp * 1.5);
                log(`🆙 恭喜升级！当前等级 Lv.${player.lv}，属性全面提升！`);
            }

            // 3秒后生成新怪物
            setTimeout(spawnEnemy, 2000);
        }

        // 游戏开始
        spawnEnemy();
    </script>
</body>
</html>
